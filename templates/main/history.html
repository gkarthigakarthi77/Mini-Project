{% extends "base.html" %}
{% block title %}History - SecurePass Analyzer{% endblock %}
{% block content %}
<div class="container py-4">
    <h2 class="gradient-text mb-4"><i class="fas fa-history me-2"></i>Password History</h2>
    <div class="glass-card p-4 fade-in">
        <div class="mb-3 d-flex">
            <input type="text" class="form-control bg-transparent text-light me-2" placeholder="Search by hash or score..." id="historySearch">
            <button class="btn btn-gradient" id="searchBtn"><i class="fas fa-search"></i></button>
            <button class="btn btn-outline-secondary ms-2" id="clearSearchBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle" id="historyTable">
                <thead><tr><th>#</th><th>Hash (truncated)</th><th>Score</th><th>Level</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody id="historyBody"><tr><td colspan="6" class="text-center">Loading...</td></tr></tbody>
            </table>
        </div>
        <nav><ul class="pagination justify-content-center" id="pagination"></ul></nav>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;
let currentSearch = '';

function loadHistory(page = 1, search = '') {
    const url = `/api/history?page=${page}&per_page=10&search=${encodeURIComponent(search)}`;
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.error) { alert('Error: ' + data.error); return; }
            renderTable(data.items);
            renderPagination(data);
        })
        .catch(err => { console.error('History fetch error:', err); });
}

function renderTable(items) {
    const tbody = document.getElementById('historyBody');
    if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center">No records found.</td></tr>';
        return;
    }
    tbody.innerHTML = '';
    items.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${index + 1 + (currentPage-1)*10}</td>
            <td>${item.hash_preview}</td>
            <td><span class="badge ${item.score >= 60 ? 'bg-success' : item.score >= 40 ? 'bg-warning' : 'bg-danger'}">${item.score}</span></td>
            <td>${item.level}</td>
            <td>${item.created_at}</td>
            <td>
                <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${item.id}"><i class="fas fa-trash"></i></button>
                <a href="/api/report/${item.id}/download" class="btn btn-sm btn-outline-info"><i class="fas fa-file-pdf"></i></a>
            </td>
        `;
        tbody.appendChild(tr);
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = this.dataset.id;
            if (confirm('Delete this history record?')) {
                fetch(`/api/history/${id}`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.message) loadHistory(currentPage, currentSearch);
                        else alert('Delete failed: ' + data.error);
                    })
                    .catch(err => { alert('Delete error.'); console.error(err); });
            }
        });
    });
}

function renderPagination(data) {
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';
    const totalPages = data.pages || 1;
    const current = data.page || 1;
    const prevLi = document.createElement('li');
    prevLi.className = `page-item ${current <= 1 ? 'disabled' : ''}`;
    prevLi.innerHTML = `<a class="page-link" href="#" data-page="${current - 1}">Previous</a>`;
    pagination.appendChild(prevLi);
    for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement('li');
        li.className = `page-item ${i === current ? 'active' : ''}`;
        li.innerHTML = `<a class="page-link" href="#" data-page="${i}">${i}</a>`;
        pagination.appendChild(li);
    }
    const nextLi = document.createElement('li');
    nextLi.className = `page-item ${current >= totalPages ? 'disabled' : ''}`;
    nextLi.innerHTML = `<a class="page-link" href="#" data-page="${current + 1}">Next</a>`;
    pagination.appendChild(nextLi);
    pagination.querySelectorAll('a.page-link').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const page = parseInt(this.dataset.page);
            if (page && page >= 1 && page <= totalPages) {
                currentPage = page;
                loadHistory(currentPage, currentSearch);
            }
        });
    });
}

document.addEventListener('DOMContentLoaded', function() {
    loadHistory(1, '');
    document.getElementById('searchBtn').addEventListener('click', function() {
        currentSearch = document.getElementById('historySearch').value.trim();
        currentPage = 1;
        loadHistory(currentPage, currentSearch);
    });
    document.getElementById('historySearch').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
    document.getElementById('clearSearchBtn').addEventListener('click', function() {
        document.getElementById('historySearch').value = '';
        currentSearch = '';
        currentPage = 1;
        loadHistory(currentPage, currentSearch);
    });
});
</script>
{% endblock %}
