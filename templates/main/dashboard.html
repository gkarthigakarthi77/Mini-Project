{% extends "base.html" %}
{% block title %}Dashboard - SecurePass Analyzer{% endblock %}
{% block content %}
<div class="container py-4">
    <h2 class="gradient-text mb-4"><i class="fas fa-chart-pie me-2"></i>Dashboard</h2>
    <div class="row g-4 mb-4" id="statsCards">
        <div class="col-md-3 col-6">
            <div class="glass-card p-3 text-center">
                <div class="stat-number" id="statTotal">0</div>
                <div class="text-secondary">Total Analyses</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="glass-card p-3 text-center">
                <div class="stat-number" id="statAvg">0%</div>
                <div class="text-secondary">Average Score</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="glass-card p-3 text-center">
                <div class="stat-number" id="statStrong">0</div>
                <div class="text-secondary">Strong</div>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="glass-card p-3 text-center">
                <div class="stat-number" id="statWeak">0</div>
                <div class="text-secondary">Weak</div>
            </div>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="glass-card p-3">
                <h5>Strength Distribution</h5>
                <canvas id="pieChart" width="400" height="300"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="glass-card p-3">
                <h5>Weekly Trend</h5>
                <canvas id="lineChart" width="400" height="300"></canvas>
            </div>
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-12">
            <div class="glass-card p-3">
                <h5>Recent Analyses</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-striped" id="recentTable">
                        <thead><tr><th>Date</th><th>Score</th><th>Level</th></tr></thead>
                        <tbody id="recentBody"><tr><td colspan="3" class="text-center">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/dashboard')
        .then(response => response.json())
        .then(data => {
            if (data.error) { console.error(data.error); return; }
            document.getElementById('statTotal').textContent = data.stats.total;
            document.getElementById('statAvg').textContent = data.stats.average_score + '%';
            document.getElementById('statStrong').textContent = data.stats.strong_count;
            document.getElementById('statWeak').textContent = data.stats.weak_count;

            const ctxPie = document.getElementById('pieChart').getContext('2d');
            new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: data.distribution.labels,
                    datasets: [{
                        data: data.distribution.data,
                        backgroundColor: ['#e74c3c', '#f39c12', '#f1c40f', '#2ecc71', '#00b894']
                    }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: '#e8edf5' } } } }
            });
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            const trend = data.trend;
            new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: trend.labels,
                    datasets: [{
                        label: 'Average Score',
                        data: trend.data,
                        borderColor: '#4a8cf7',
                        tension: 0.3,
                        fill: false,
                        spanGaps: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#e8edf5' } } },
                    scales: { x: { ticks: { color: '#a0b4d0' } }, y: { min: 0, max: 100, ticks: { color: '#a0b4d0' } } }
                }
            });
            const tbody = document.getElementById('recentBody');
            tbody.innerHTML = '';
            if (data.recent.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center">No analyses yet.</td></tr>';
            } else {
                data.recent.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.created_at}</td><td>${item.score}</td><td>${item.level}</td>`;
                    tbody.appendChild(tr);
                });
            }
        })
        .catch(err => console.error('Dashboard fetch error:', err));
});
</script>
{% endblock %}
